{{ define "main" }}
<div class="page-hero vtex-navy" style="background:var(--navy);padding:8rem 4rem 4rem;position:relative;overflow:hidden;">
  <div class="z1">
    <div class="page-hero-label">
      <span style="width:28px;height:1px;background:var(--yellow);opacity:0.6;display:inline-block;vertical-align:middle;margin-right:12px;"></span>
      <a href="{{ "/membros/" | relURL }}" style="color:rgba(245,197,24,0.75);text-decoration:none;letter-spacing:0.22em;text-transform:uppercase;font-size:10px;font-family:var(--mono);">← Pesquisadores</a>
    </div>
    <h1 class="page-hero-title">{{ .Title }}</h1>
    <div style="font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.12em;text-transform:uppercase;margin-top:1rem;">{{ .Params.instituicao }}</div>
  </div>
</div>

<svg width="100%" height="44" style="display:block;background:var(--cream)" preserveAspectRatio="none" viewBox="0 0 800 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs><pattern id="p2" x="0" y="0" width="80" height="44" patternUnits="userSpaceOnUse"><g fill="none" stroke="#0B1929" stroke-width="1.2" opacity="0.14"><polyline points="4,0 4,12 12,12 12,20 20,20 20,28 28,28 28,20 36,20 36,12 44,12 44,0"/></g></pattern></defs>
  <rect width="800" height="44" fill="url(#p2)"/>
</svg>

<section class="section-cream" style="padding:5rem 4rem;">
  <div style="max-width:900px;margin:0 auto;display:grid;grid-template-columns:240px 1fr;gap:4rem;align-items:start;">

    <!-- FOTO -->
    <div>
      {{ if .Params.foto }}
      <img
        src="{{ .Params.foto | relURL }}"
        alt="{{ .Title }}"
        width="240"
        height="280"
        style="width:240px;height:280px;object-fit:cover;object-position:top center;display:block;border:1px solid rgba(11,25,41,0.08);"
      >
      {{ else }}
      <div style="width:240px;height:280px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:5rem;font-weight:600;color:var(--yellow);">
        {{ .Params.sigla | upper }}
      </div>
      {{ end }}

      {{ if .Params.link }}
      <a href="{{ .Params.link }}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;margin-top:1rem;font-family:var(--body);font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--navy);text-decoration:none;border-bottom:1px solid rgba(11,25,41,0.2);padding-bottom:2px;">Currículo Lattes ↗</a>
      {{ end }}
    </div>

    <!-- CONTEÚDO -->
    <div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--yellow-dk);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem;">{{ .Params.instituicao }}</div>
      <div style="height:2px;width:48px;background:var(--yellow);margin-bottom:1rem;"></div>
      <div style="font-family:var(--body);font-size:14px;color:var(--muted);margin-bottom:2rem;font-style:italic;">{{ .Params.area }}</div>

      {{ if .Content }}
      <div style="font-family:var(--body);font-size:1rem;font-weight:300;color:#3a4a5c;line-height:1.9;">
        {{ .Content }}
      </div>
      {{ end }}
    </div>

  </div>
</section>

<style>
@media (max-width: 640px) {
  section > div { grid-template-columns: 1fr !important; }
  section img, section > div > div:first-child > div { width: 100% !important; height: 260px !important; }
}
</style>
{{ end }}
