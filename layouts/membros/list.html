{{ define "main" }}
<div class="page-hero vtex-navy" style="background:var(--navy);padding:8rem 4rem 4rem;position:relative;overflow:hidden;">
  <div class="z1">
    <div class="page-hero-label"><span style="width:28px;height:1px;background:var(--yellow);opacity:0.6;display:inline-block;vertical-align:middle;margin-right:12px;"></span>Equipe</div>
    <h1 class="page-hero-title">Pesquisadores do <em>NEU</em></h1>
  </div>
</div>

<svg width="100%" height="44" style="display:block;background:var(--cream-dkk)" preserveAspectRatio="none" viewBox="0 0 800 44" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><pattern id="p2" x="0" y="0" width="80" height="44" patternUnits="userSpaceOnUse"><g fill="none" stroke="#0B1929" stroke-width="1.2" opacity="0.14"><polyline points="4,0 4,12 12,12 12,20 20,20 20,28 28,28 28,20 36,20 36,12 44,12 44,0"/></g></pattern></defs><rect width="800" height="44" fill="url(#p2)"/></svg>

<section class="section-cream-dkk vtex" aria-labelledby="membros-title">
  <div style="position:relative;z-index:1;">
    <div class="section-label">Todos os pesquisadores</div>
    <h2 id="membros-title" class="section-title" style="margin-bottom:3rem;">Equipe do NEU</h2>
    <div class="card-grid-4">
      {{ range .Pages }}
      <article class="member-card">
        {{ if .Params.foto }}
        <img src="{{ .Params.foto }}" alt="{{ .Title }}" width="48" height="48" style="object-fit:cover;margin-bottom:1rem;">
        {{ else }}
        <div class="member-avatar">{{ .Params.sigla | upper }}</div>
        {{ end }}
        <h3 class="member-name"><a href="{{ .Permalink }}" style="color:inherit;text-decoration:none;">{{ .Title }}</a></h3>
        <div class="member-inst">{{ .Params.instituicao }}</div>
        <div class="member-area">{{ .Params.area }}</div>
        {{ if .Params.link }}
        <a href="{{ .Params.link }}" target="_blank" rel="noopener" style="font-family:var(--mono);font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;margin-top:8px;display:inline-block;">Lattes ↗</a>
        {{ end }}
      </article>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
