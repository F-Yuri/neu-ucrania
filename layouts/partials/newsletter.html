<div id="newsletter" class="newsletter vtex-navy">
  <div class="newsletter-text">
    <div class="section-label on-navy">Fique informado</div>
    <h2 class="section-title" style="color:#fff;font-size:2rem;">Receba as novidades do NEU</h2>
    <p class="newsletter-sub">Publicações, eventos e análises sobre a Ucrânia diretamente no seu email.</p>
  </div>
  <div>
    <form class="newsletter-form" name="newsletter" method="POST" data-netlify="true" action="/obrigado/">
      <input type="hidden" name="form-name" value="newsletter">
      <input class="newsletter-input" type="email" name="email" placeholder="seu@email.com.br" required>
      <button class="newsletter-btn" type="submit">Inscrever-se</button>
    </form>
  </div>
</div>
