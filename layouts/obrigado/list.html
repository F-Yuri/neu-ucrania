{{ define "main" }}
<div style="background:var(--navy);padding:10rem 4rem 6rem;position:relative;overflow:hidden;min-height:60vh;display:flex;align-items:center;">
  <div class="z1 vtex-navy" style="text-align:center;width:100%;">
    <div style="font-family:var(--mono);font-size:10px;color:var(--yellow);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:2rem;">Inscrição confirmada</div>
    <h1 style="font-family:var(--display);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:600;color:#fff;margin-bottom:1.5rem;line-height:1.1;">
      Obrigado pelo <em style="color:var(--yellow);font-style:italic;font-weight:400;">interesse</em>
    </h1>
    <p style="font-size:1rem;font-weight:300;color:rgba(255,255,255,0.55);max-width:480px;margin:0 auto 3rem;line-height:1.85;">
      Você receberá as novidades do NEU — publicações, eventos e análises sobre a Ucrânia.
    </p>
    <a href="/" class="btn-yellow">← Voltar para o início</a>
  </div>
</div>
{{ end }}
